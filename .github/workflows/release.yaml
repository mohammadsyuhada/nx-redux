---
name: Release NextUI

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "release type"
        default: "patch"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zipmerge

      - name: Build
        run: make all COMPILE_CORES=true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: release-artifacts
          path: releases/*.zip

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2.3.0
        with:
          subject-path: releases/*.zip

  release:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Compute Next Tag
        id: next-tag
        run: |
          LATEST_TAG="$(git describe --tags "$(git rev-list --tags --max-count=1)" 2>/dev/null || echo "v0.0.0")"
          echo "LATEST_TAG=$LATEST_TAG"
          # Bump version using semver logic
          IFS='.' read -r major minor patch <<< "${LATEST_TAG#v}"
          case "${{ github.event.inputs.release_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          NEXT_TAG="v${major}.${minor}.${patch}"
          echo "NEXT_TAG=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEXT_TAG"

      - name: Download Release Artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: releases/
          pattern: release-artifacts
          merge-multiple: true

      - name: Create and Push Tag
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git tag "${{ steps.next-tag.outputs.NEXT_TAG }}"
          git push origin "${{ steps.next-tag.outputs.NEXT_TAG }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/*
          generate_release_notes: true
          append_body: true
          tag_name: ${{ steps.next-tag.outputs.NEXT_TAG }}
          make_latest: "true"
          body: |

            For full features list and help on how to use etc of NextUI:
            https://nextui.loveretro.games/docs/

            ## How to install/update
            For a fresh installation, follow the instructions here: https://nextui.loveretro.games/getting-started/installation/
            When updating from a previous release: https://nextui.loveretro.games/getting-started/updating/
